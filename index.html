<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hylune</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d0d0d;
  color: white;
}

header {
  padding: 20px;
  text-align: center;
  font-size: 28px;
  font-weight: bold;
  background: black;
  letter-spacing: 2px;
}

.container {
  padding: 20px;
}

.product {
  background: #1a1a1a;
  margin-bottom: 20px;
  padding: 15px;
  border-radius: 10px;
}

.product img, video {
  width: 100%;
  border-radius: 10px;
}

.price {
  color: gold;
  font-weight: bold;
  margin-top: 10px;
}

button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  border: none;
  background: gold;
  color: black;
  font-weight: bold;
  border-radius: 5px;
  cursor: pointer;
}

.note {
  text-align: center;
  margin-top: 20px;
  color: gray;
}
</style>

</head>

<body>

<header>HYLUNE</header>

<div class="container">

<div class="product">
  <img src="https://via.placeholder.com/300">
  <h3>Premium Matte Case</h3>
  <p>iPhone 13</p>
  <div class="price">₹120 (Wholesale)</div>

  <button onclick="order('Premium Matte Case','iPhone 13')">
    Chat on WhatsApp
  </button>
</div>

<div class="product">
  <img src="https://via.placeholder.com/300">
  <h3>Transparent Case</h3>
  <p>Samsung S21</p>
  <div class="price">₹90 (Wholesale)</div>

  <button onclick="order('Transparent Case','Samsung S21')">
    Chat on WhatsApp
  </button>
</div>

<p class="note">Fixed price – no negotiation</p>

</div>

<script>
function order(product, model) {
  let msg = `Hi Hylune, I want to order ${product} for ${model}`;
  let url = "https://wa.me/919354561146?text=" + encodeURIComponent(msg);
  window.open(url, '_blank');
}
</script>

</body>
</html>
