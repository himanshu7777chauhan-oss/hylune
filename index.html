<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hylune</title>

<style>
body { margin:0; font-family:Arial; background:#0d0d0d; color:white;}
header { padding:15px; text-align:center; font-size:24px; background:black; }
.container { padding:15px; }

select, input {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:5px;
  border:none;
}

.product {
  background:#1a1a1a;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

img, video { width:100%; border-radius:10px; }

button {
  margin-top:8px;
  padding:10px;
  width:100%;
  border:none;
  background:gold;
  color:black;
  font-weight:bold;
  border-radius:5px;
}

.admin { display:none; background:#111; padding:10px; }
.note { text-align:center; color:gray; margin-top:10px;}
</style>

</head>

<body>

<header>HYLUNE</header>

<div class="container">

<!-- FILTER -->
<select id="brandFilter">
<option value="">All Brands</option>
<option>iPhone</option>
<option>Samsung</option>
<option>Vivo</option>
<option>Oppo</option>
<option>Realme</option>
</select>

<select id="categoryFilter">
<option value="">All Categories</option>
<option>Premium</option>
<option>Matte</option>
<option>Transparent</option>
<option>Rugged</option>
</select>

<button onclick="loadProducts()">Apply Filter</button>

<!-- PRODUCTS -->
<div id="products"></div>

<p class="note">Fixed price – no negotiation</p>

<hr>

<!-- ADMIN LOGIN -->
<input type="password" id="adminPass" placeholder="Admin Password">
<button onclick="login()">Enter Admin</button>

<!-- ADMIN PANEL -->
<div class="admin" id="adminPanel">

<h3>Add Product</h3>

<input id="name" placeholder="Product Name">
<input id="model" placeholder="Phone Model">
<input id="brand" placeholder="Brand">
<input id="category" placeholder="Category">
<input id="price" placeholder="Price">

<input type="file" id="imageInput">
<input type="file" id="videoInput">

<button onclick="addProduct()">Add Product</button>

</div>

</div>

<script>

let password = "1234"; // change this

function login(){
  let p = document.getElementById("adminPass").value;
  if(p === password){
    document.getElementById("adminPanel").style.display="block";
  } else {
    alert("Wrong password");
  }
}

function toBase64(file, callback){
  let reader = new FileReader();
  reader.onload = () => callback(reader.result);
  reader.readAsDataURL(file);
}

function addProduct(){

  let product = {
    name: name.value,
    model: model.value,
    brand: brand.value,
    category: category.value,
    price: price.value,
    image: "",
    video: ""
  };

  let imgFile = imageInput.files[0];
  let vidFile = videoInput.files[0];

  if(imgFile){
    toBase64(imgFile, (res)=>{
      product.image = res;
      saveProduct(product);
    });
  } else {
    saveProduct(product);
  }

  if(vidFile){
    toBase64(vidFile, (res)=>{
      product.video = res;
      saveProduct(product);
    });
  }
}

function saveProduct(product){
  let data = JSON.parse(localStorage.getItem("products")||"[]");
  data.push(product);
  localStorage.setItem("products", JSON.stringify(data));
  loadProducts();
}

function loadProducts(){

  let data = JSON.parse(localStorage.getItem("products")||"[]");

  let brandF = brandFilter.value;
  let catF = categoryFilter.value;

  let html="";

  data.forEach((p,i)=>{

    if((!brandF || p.brand===brandF) && (!catF || p.category===catF)){

      html += `
      <div class="product">
        ${p.image ? `<img src="${p.image}">` : ""}
        ${p.video ? `<video controls src="${p.video}"></video>` : ""}

        <h3>${p.name}</h3>
        <p>${p.model}</p>
        <p>₹${p.price} (Wholesale)</p>

        <button onclick="order('${p.name}','${p.model}')">
        Chat on WhatsApp
        </button>

        <button onclick="deleteProduct(${i})">Delete</button>
      </div>`;
    }

  });

  products.innerHTML = html;
}

function deleteProduct(i){
  let data = JSON.parse(localStorage.getItem("products"));
  data.splice(i,1);
  localStorage.setItem("products", JSON.stringify(data));
  loadProducts();
}

function order(product, model){
  let msg = `Hi Hylune, I want to order ${product} for ${model}`;
  let url = "https://wa.me/919354561146?text=" + encodeURIComponent(msg);
  window.open(url, '_blank');
}

loadProducts();

</script>

</body>
  </html>
